<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Static Google Clone</title>
</head>

<body>
    <nav class="nav-bar">
        <div class="nav-left">
            <button>About</button>
            <button>Store</button>
        </div>
        <div class="nav-right">
            <button>Gmail</button>
            <button>Images</button>
            <button id="lab-btn"><img src="Images/chemistry-lab-instrument.png"></button>
            <button class="icon-btn"><img src="Images/app-grid.png"></button>
            <button class="icon-btn"><img src="Images/user.png"></button>
        </div>
    </nav>
    <main>
        <div class="google-logo">
            <img src="Images/google logo.png">
        </div>
        <div class="search-bar">
            <div class="search-bar-left">
                <button class="icon-btn"><img src="Images/plus-icon.png"></button>
                <input type="text">
            </div>
            <div class="search-bar-right">
                <button class="icon-btn"><img src="Images/mic-icon.png"></button>
                <button class="icon-btn"><img src="Images/camera-icon.png"></button>
                <button>AI Mode</button>
            </div>
        </div>
        <div class="sub-header-search-bar">
            <button>Google Search</button>
            <button>I'm Feeling Lucky</button>
        </div>
        <div class="language-line">
            Google offered in:
            <a href="#">हिन्दी</a>
            <a href="#">বাংলা</a>
            <a href="#">తెలుగు</a>
            <a href="#">मराठी</a>
            <a href="#">தமிழ்</a>
            <a href="#">ગુજરાતી</a>
            <a href="#">ಕನ್ನಡ</a>
            <a href="#">മലയാളം</a>
            <a href="#">ਪੰਜਾਬੀ</a>
        </div>
    </main>
    <footer>
        <div class="section-1">
            India
        </div>
        <div class="section-2">
            <div class="section-2-left">
                <button>Advertising</button>
                <button>Business</button>
                <button>How Search Works</button>
            </div>
            <div class="section-2-right">
                <button>Privacy</button>
                <button>Terms</button>
                <button>Settings</button>
            </div>
        </div>
    </footer>

</body>

</html>
